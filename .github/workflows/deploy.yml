name: 🚀 Auto Deploy Production

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'

env:
  NODE_VERSION: '18'

jobs:
  # Pre-deploy validation
  validate-spanish-features:
    name: ✅ Validar Funcionalidades Españolas
    runs-on: ubuntu-latest
    
    steps:
    - name: 📦 Checkout
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: 📥 Install dependencies
      run: npm install --legacy-peer-deps

    - name: 🏗️ Setup test database
      run: |
        echo "DATABASE_URL=file:./test.db" > .env
        echo "BETTER_AUTH_SECRET=test-secret" >> .env
        npx prisma generate
        npx prisma migrate deploy

    - name: 🇪🇸 Validar funcionalidades españolas críticas
      run: |
        echo "🧪 Ejecutando tests críticos antes del deploy..."
        node scripts/quick-spanish-test.js
        echo "✅ Tests españoles pasaron - OK para deploy"

    - name: 🏗️ Test build production
      run: |
        echo "DATABASE_URL=file:./prod-test.db" > .env.local
        echo "BETTER_AUTH_SECRET=prod-test-secret" >> .env.local
        echo "SKIP_ENV_VALIDATION=true" >> .env.local
        npm run build
      env:
        CI: true

  # Deploy to Vercel (if configured)
  deploy-vercel:
    name: 🌐 Deploy Vercel
    runs-on: ubuntu-latest
    needs: validate-spanish-features
    if: false # Habilitar cuando configures secrets en GitHub
    
    steps:
    - name: 📦 Checkout
      uses: actions/checkout@v4

    - name: 🚀 Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.ORG_ID }}
        vercel-project-id: ${{ secrets.PROJECT_ID }}
        vercel-args: '--prod'
        working-directory: ./

  # Build Docker image for production
  build-and-push-docker:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: validate-spanish-features
    if: false # Habilitar si usas Docker registry
    
    steps:
    - name: 📦 Checkout
      uses: actions/checkout@v4

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🔑 Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 🏗️ Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          taxflow-es:latest
          taxflow-es:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Deploy notification
  notify-deploy-success:
    name: 🎉 Deploy Completado
    runs-on: ubuntu-latest
    needs: [validate-spanish-features]
    if: success()
    
    steps:
    - name: 🎊 Notificar deploy exitoso
      run: |
        echo "🚀 ¡TaxFlow ES deployed exitosamente!"
        echo "🇪🇸 Funcionalidades españolas validadas"
        echo "✅ Build production OK"
        echo "🌐 Aplicación lista en producción"
        echo ""
        echo "🔗 URLs de deploy:"
        echo "   • Vercel: https://taxflow-es.vercel.app (si configurado)"
        echo "   • Railway: https://taxflow-es.up.railway.app (si configurado)"
        echo ""
        echo "📊 Funcionalidades activas:"
        echo "   • ✅ Validación NIF/CIF/NIE"
        echo "   • ✅ Cálculo automático IVA"
        echo "   • ✅ Detección IRPF"
        echo "   • ✅ Exportaciones españolas"

  notify-deploy-failure:
    name: ❌ Deploy Falló
    runs-on: ubuntu-latest
    needs: [validate-spanish-features]
    if: failure()
    
    steps:
    - name: 🚨 Notificar fallo deploy
      run: |
        echo "❌ Deploy de TaxFlow ES falló"
        echo "🔍 Revisa los logs de CI/CD"
        echo "🇪🇸 Verifica funcionalidades españolas"
        echo "📧 Notifica al team de desarrollo"