[build]
builder = "nixpacks"

[deploy]
numReplicas = 1
sleepApplication = false
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[deploy.healthcheck]]
path = "/api/health" 
port = 3000
initialDelaySeconds = 60
periodSeconds = 10

[env]
NODE_ENV = "production"
PORT = "3000"
SKIP_ENV_VALIDATION = "true"

# Comandos de build personalizados
[[build.commandOverrides]]
packages = ["nodejs-18_x"]

[nixpacks.phases.build]
cmds = [
  "npm install --legacy-peer-deps",
  "npx prisma generate", 
  "npm run build"
]

[nixpacks.phases.start]
cmd = "npm start"

# Variables de entorno requeridas (configurar desde Railway UI):
# DATABASE_URL - PostgreSQL connection string
# BETTER_AUTH_SECRET - Random secure string  
# OPENAI_API_KEY - Optional, para funcionalidades IA